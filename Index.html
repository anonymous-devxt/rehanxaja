<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAIHAN MODZ • PREMIUM</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
:root{ --bg:#040814; --card:rgba(255,255,255,.06); --border:rgba(255,255,255,.08); --accent:#38bdf8; --accent2:#8b5cf6; --text:#fff; --muted:#9aa5b1; }
*{ margin:0; padding:0; box-sizing:border-box; font-family:Poppins; }
body{ background: radial-gradient(circle at top,#14325e 0%,transparent 35%), linear-gradient(145deg,#050816,#091220,#050816); color:white; min-height:100vh; display:flex; justify-content:center; padding:24px; }
.container{ width:100%; max-width:430px; }
.logo{ text-align:center; margin-bottom:25px; }
.logo h1{ font-size:36px; font-weight:800; background:linear-gradient(90deg, white, var(--accent), var(--accent2)); -webkit-background-clip:text; color:transparent; }
.logo p{ color:var(--muted); font-size:13px; margin-top:6px; }
.card{ background:var(--card); border:1px solid var(--border); backdrop-filter:blur(24px); padding:22px; border-radius:30px; margin-bottom:18px; box-shadow:0 30px 80px rgba(0,0,0,.35); }
.section{ font-size:11px; letter-spacing:3px; color:var(--accent); margin-bottom:18px; }
button{ width:100%; padding:15px; border:none; border-radius:18px; font-size:14px; font-weight:700; cursor:pointer; transition:.25s; color:white; background:linear-gradient(90deg, var(--accent), var(--accent2)); }
button:hover{ transform:translateY(-3px); box-shadow:0 0 40px rgba(56,189,248,.35); }
.console{ display:none; margin-top:16px; padding:16px; background:#020308; border-radius:20px; border:1px solid #1b1b1b; }
.log{ font-family:monospace; font-size:13px; margin-bottom:12px; color:#8ff5ff; }
.bar{ height:10px; background:#121212; border-radius:50px; overflow:hidden; }
.fill{ height:100%; width:0; transition:.8s; background:linear-gradient(90deg, var(--accent), var(--accent2)); }
.tool{ background:rgba(255,255,255,.03); padding:16px; border-radius:22px; }
.tool-head{ display:flex; justify-content:space-between; gap:12px; align-items:center; }
.price{ margin-top:4px; color:#59d6ff; font-size:14px; }
.buy-btn{ width:auto; padding:12px 18px; background:linear-gradient(90deg, #34d399, #16a34a); }
.desc{ margin-top:12px; color:var(--muted); font-size:12px; line-height:1.9; }
.footer{ text-align:center; margin-top:18px; font-size:11px; color:#667; }
.glow{ animation:glow 2s infinite; }
@keyframes glow{ 50%{ box-shadow:0 0 35px rgba(56,189,248,.25); } }
</style>
</head>
<body>
<div class="container">
    <div class="logo"><h1>RAIHAN MODZ</h1><p>Dashboard</p></div>
    
    <div class="card glow">
        <div class="section">TES KECEPATAN INTERNET</div>
        <button id="scanBtn" onclick="scan()">SCAN KONEKSI</button>
        <div class="console" id="console">
            <div class="log" id="log">Menunggu...</div>
            <div class="bar"><div class="fill" id="fill"></div></div>
        </div>
    </div>

    <div class="card">
        <div class="section">TOOLS DOS WIFI</div>
        <div class="tool">
            <div class="tool-head">
                <div><div>tools dos waifi gacor</div><div class="price">Rp10.000</div></div>
                <button class="buy-btn" onclick="salinWA()">SALIN WA</button>
            </div>
            <div class="desc">•RISIKO? TANGGUNG SENDIRI NANTI FUL TUTOR CARA ISTALL TOOLS NYA<br>• Klik *SALIN WA* lalu paste ke WhatsApp</div>
        </div>
    </div>

    <div class="card">
        <div class="section">APK LINUX V2, AMAN NO VIRUS </div>
        <button onclick="downloadApp()">DOWNLOAD APK</button>
    </div>

    <div class="footer">© 2026 RAIHAN MODZ</div>
</div>

<script>
    // Link MediaFire sudah terpasang
    const linkDownload = "https://www.mediafire.com/file/ykwljbsfe6mbgrn/Linux_v2.apk/file";

    function scan(){
        const btn = document.getElementById("scanBtn");
        const box = document.getElementById("console");
        const fill = document.getElementById("fill");
        const log = document.getElementById("log");
        const step = ["Connecting", "Checking", "Synchronizing", "Ready"];
        const speed = (Math.random() * (150 - 50) + 50).toFixed(1);
        
        btn.disabled = true;
        box.style.display = "block";
        fill.style.width = "0%";
        let i = 0;
        const timer = setInterval(()=>{
            log.innerHTML = "● " + step[i];
            fill.style.width = ((i+1)*25) + "%";
            i++;
            if(i >= step.length){
                clearInterval(timer);
                setTimeout(()=>{ 
                    log.innerHTML = "✓ CONNECTED<br>Speed: " + speed + " Mbps<br>Latency: 24ms"; 
                    btn.disabled = false; 
                }, 400);
            }
        }, 850);
    }

    async function salinWA(){
        try {
            await navigator.clipboard.writeText("62895360018626");
            alert("Nomor berhasil disalin! Silakan paste di WhatsApp.");
        } catch {
            prompt("Salin nomor:", "62895360018626");
        }
    }

    function downloadApp(){
        window.open(linkDownload, "_blank");
    }
</script>
</body>
</html>
